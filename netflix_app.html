<!DOCTYPE html>
<html>
<head>
  <title>Netflix Style App</title>
  <style>
    body { margin:0; font-family: Arial; background:#141414; color:white; }
    header { padding:15px; font-size:24px; font-weight:bold; }
    #search { width:90%; padding:10px; margin:10px; }
    .row { display:flex; overflow-x:auto; padding:10px; }
    .movie { min-width:150px; margin-right:10px; transition:0.3s; }
    .movie img { width:100%; border-radius:5px; }
    .movie:hover { transform:scale(1.1); }
  </style>
</head>
<body>
  <header>🎬 MyFlix</header>
  <input type="text" id="search" placeholder="Search movies..." onkeyup="searchMovie()" />

  <div class="row" id="movies"></div>

  <script>
    const movies = [
      {title:"Inception", img:"https://via.placeholder.com/150"},
      {title:"Avengers", img:"https://via.placeholder.com/150"},
      {title:"Titanic", img:"https://via.placeholder.com/150"},
      {title:"Batman", img:"https://via.placeholder.com/150"},
      {title:"Spiderman", img:"https://via.placeholder.com/150"}
    ];

    function displayMovies(list) {
      const container = document.getElementById("movies");
      container.innerHTML = "";

      list.forEach(m => {
        const div = document.createElement("div");
        div.className = "movie";
        div.innerHTML = `<img src="${m.img}"><p>${m.title}</p>`;
        container.appendChild(div);
      });
    }

    function searchMovie() {
      const value = document.getElementById("search").value.toLowerCase();
      const filtered = movies.filter(m => m.title.toLowerCase().includes(value));
      displayMovies(filtered);
    }

    window.onload = () => displayMovies(movies);
  </script>
</body>
</html>
